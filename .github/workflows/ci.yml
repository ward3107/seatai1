name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The repo is an npm workspace: package-lock.json lives at the root,
# the `web/` workspace is referenced via the `workspaces` field, and
# the root scripts (`lint`, `test`, `build`) delegate to `web/`. CI has
# to mirror that — running `npm ci` inside `web/` would fail because
# there's no lockfile there.

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: web/dist/
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Playwright + dev server bootstrap takes time; give it room.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        # Only Chromium in CI to keep runtime reasonable. Firefox / WebKit /
        # mobile profiles still run locally and pre-release via
        # `npm run test:e2e` (see playwright.config.ts).
        run: npx playwright install --with-deps chromium
        working-directory: web
      - name: Run Playwright tests
        run: npm run test:e2e -- --project=chromium
        working-directory: web
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
